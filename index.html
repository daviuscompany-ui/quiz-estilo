<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubra Seu Estilo Masculino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --black: #090909;
    --card: #141414;
    --border-soft: rgba(255,255,255,0.06);
    --border-gold: rgba(201,168,76,0.18);
    --text: #E8E8E8;
    --muted: #777;
    --muted2: #444;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 20px 72px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown 0.9s ease both;
  }

  .eyebrow {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 20px;
    padding: 6px 18px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 8vw, 58px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1.5px;
    color: #fff;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .header p {
    margin-top: 18px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.65;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .gold-line {
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin: 22px auto 0;
    opacity: 0.5;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .progress-pct {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
  }

  .progress-bar {
    height: 1px;
    background: rgba(255,255,255,0.07);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.55s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 10px rgba(201,168,76,0.5);
  }

  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted2);
    transition: all 0.3s;
  }
  .dot.done   { background: var(--gold); }
  .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.35); }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 38px 32px 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.35;
  }

  .q-number {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(19px, 4.5vw, 26px);
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
    margin-bottom: 30px;
  }

  /* OPTIONS */
  .options { display: grid; gap: 9px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    background: rgba(255,255,255,0.018);
    border: 1px solid rgba(255,255,255,0.065);
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.22s, background 0.22s, transform 0.22s;
    text-align: left;
    width: 100%;
  }

  .option:hover {
    border-color: rgba(201,168,76,0.35);
    background: rgba(201,168,76,0.04);
    transform: translateX(3px);
  }

  .option.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
  }

  .opt-letter {
    width: 30px; height: 30px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.22s;
  }

  .option.selected .opt-letter {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  .opt-body { flex: 1; }

  .opt-text {
    font-size: 14px;
    font-weight: 400;
    color: #bbb;
    line-height: 1.55;
    transition: color 0.2s;
  }

  .option.selected .opt-text { color: var(--text); }

  .opt-feel {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .option.selected .opt-feel { opacity: 1; }

  /* NEXT BTN */
  .btn-next {
    width: 100%;
    padding: 17px;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 3px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.22s, transform 0.22s, box-shadow 0.22s, opacity 0.3s;
    opacity: 0;
    pointer-events: none;
    margin-top: 8px;
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
    animation: fadeUp 0.35s ease both;
  }

  .btn-next:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(201,168,76,0.22);
  }

  /* RESULT */
  #resultScreen { display: none; }
  #resultScreen.visible { display: block; animation: fadeUp 0.7s ease both; }

  .result-hero {
    text-align: center;
    margin-bottom: 36px;
  }

  .result-pre {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    display: block;
    margin-bottom: 12px;
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(44px, 11vw, 76px);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(140deg, var(--gold) 20%, var(--gold-light) 60%, #fffbe6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(201,168,76,0.25));
  }

  .result-tagline {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  /* PHOTO PLACEHOLDER */
  .photo-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    border: 2px dashed rgba(201,168,76,0.3);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: var(--card);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .photo-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.03) 0%, transparent 60%);
  }

  .photo-icon {
    width: 52px; height: 52px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .photo-ph-text {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    text-align: center;
    line-height: 2;
  }

  .photo-ph-text span {
    display: block;
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 1.5px;
    text-transform: none;
    font-weight: 300;
  }

  /* RESULT INFO */
  .result-info {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .result-info::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .result-desc {
    font-size: 15px;
    line-height: 1.85;
    color: #aaa;
    font-weight: 300;
    margin-bottom: 24px;
  }

  .result-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .trait {
    padding: 6px 13px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }

  /* CTA */
  .cta-card {
    background: linear-gradient(135deg, rgba(201,168,76,0.07) 0%, rgba(201,168,76,0.02) 100%);
    border: 1px solid rgba(201,168,76,0.28);
    border-radius: 4px;
    padding: 30px 28px;
    text-align: center;
    margin-bottom: 12px;
  }

  .cta-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .cta-sub {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 22px;
  }

  .btn-shopee {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 17px 36px;
    background: #EE4D2D;
    color: #fff;
    text-decoration: none;
    border-radius: 3px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.25s;
    width: 100%;
  }

  .btn-shopee:hover {
    background: #d44326;
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(238,77,45,0.3);
  }

  .btn-restart {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-soft);
    border-radius: 3px;
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.22s;
  }

  .btn-restart:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.15);
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-animate { animation: cardIn 0.42s cubic-bezier(.4,0,.2,1) both; }

  @media (max-width: 480px) {
    .question-card { padding: 28px 18px 24px; }
    .result-info   { padding: 26px 18px; }
    .cta-card      { padding: 24px 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <span class="eyebrow">Quiz de Estilo Masculino</span>
    <h1>Qual é o seu<br><em>Estilo?</em></h1>
    <p>Responda 3 perguntas e descubra qual identidade visual combina com quem você quer ser.</p>
    <div class="gold-line"></div>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label" id="progressLabel">Pergunta 1 de 3</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-dots" id="progressDots"></div>
    </div>

    <div class="question-card card-animate" id="questionCard">
      <div class="q-number" id="qNumber">01 —</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <button class="btn-next" id="btnNext" onclick="nextQ()">CONTINUAR →</button>
  </div>

  <!-- RESULT -->
  <div id="resultScreen">

    <div class="result-hero">
      <span class="result-pre">Seu estilo é</span>
      <div class="result-name" id="resultName"></div>
      <div class="result-tagline" id="resultTagline"></div>
    </div>

    <div id="styleImageWrap"></div>

    <div class="result-info">
      <div class="section-label">Sua identidade</div>
      <p class="result-desc" id="resultDesc"></p>
      <div class="result-traits" id="resultTraits"></div>
    </div>

    <div class="cta-card">
      <div class="cta-title">Monte esse look agora</div>
      <p class="cta-sub" id="ctaSub"></p>
      <a href="SEU_LINK_AFILIADO_SHOPEE_AQUI" id="shopeeBtn" class="btn-shopee" target="_blank" rel="noopener">
        🛍️ &nbsp; VER PEÇAS NA SHOPEE
      </a>
    </div>

    <button class="btn-restart" onclick="restart()">↩ &nbsp; REFAZER O QUIZ</button>
  </div>

</div>
<script>
const questions = [
  {
    text: "Como você quer que as pessoas se sintam quando te veem entrar numa sala?",
    options: [
      { text: "Que eu tenho classe e tenho dinheiro — sem precisar falar isso pra ninguém.", feel: "Sofisticado", style: "old_money" },
      { text: "Que eu sou diferente, confiante e não me importo muito.", feel: "Presença marcante", style: "starboy" },
      { text: "Que sou alguém sério, competente e que estou no controle.", feel: "Autoridade e credibilidade", style: "business" },
      { text: "Que eu sou autêntico, tenho minha própria vibe e não sigo regras.", feel: "Identidade própria", style: "streetwear" }
    ]
  },
  {
    text: "Quando você se olha no espelho antes de sair, o que você quer sentir?",
    options: [
      { text: "Elegância. tudo no lugar, nada exagerado, tudo com propósito.", feel: "Confiança discreta", style: "old_money" },
      { text: "Que estou no topo — minha roupa, imagem, tudo transmitindo sucesso.", feel: "Poder e atitude", style: "starboy" },
      { text: "Pronto pra lidar com qualquer ambiente — do trabalho ao jantar.", feel: "Preparado e elegante", style: "business" },
      { text: "Que eu montei meu visual — confortável, estiloso e sem depender de aprovação.", feel: "Liberdade e autenticidade", style: "streetwear" }
    ]
  },
  {
    text: "Qual dessas frases mais combina com a imagem que você quer construir?",
    options: [
      { text: "\"Não preciso mostrar quanto custa. Quem entende, entende.\"", feel: "Luxo atemporal", style: "old_money" },
      { text: "\"Meu estilo faz parte da minha história de sucesso.\"", feel: "Vida no topo", style: "starboy" },
      { text: "\"Me visto pra vencer. Cada detalhe é estratégico.\"", feel: "Ambição e foco", style: "business" },
      { text: "\"Moda é cultura. Me expresso através do que visto.\"", feel: "Cultura e identidade", style: "streetwear" }
    ]
  }
];

const results = {
  old_money: {
    name: "Old Money",
    tagline: "Luxo Silencioso · Elegância Atemporal",
    desc: "Você valoriza o que dura. Seu estilo comunica sofisticação sem precisar de logos chamativos — peças clássicas, materiais nobres e uma presença que poucos conseguem imitar. Você não quer parecer rico. Você simplesmente é refinado.",
    traits: ["Linho & Cashmere", "Paleta Neutra", "Alfaiataria", "Discreto & Elegante"],
    cta: "Selecionamos peças clássicas e atemporais para montar o seu look Old Money com qualidade real.",
    img: "img/old-money.jpg"
  },
  starboy: {
    name: "Starboy",
    tagline: "Urbano · Confiante · No Topo",
    desc: "Você vive para o impacto. Seu estilo é sofisticado, urbano e misterioso — como alguém que alcançou o sucesso e não tem medo de mostrar. Jaquetas escuras, acessórios marcantes e uma aura que comanda qualquer ambiente.",
    traits: ["Paleta Escura", "Acessórios Marcantes", "Jaqueta de Couro", "Atitude & Mistério"],
    cta: "Encontramos as peças certas pra montar o visual de quem vive no topo com estilo.",
    img: "img/starboy.jpg"
  },
  business: {
    name: "Business",
    tagline: "Poder · Precisão · Credibilidade",
    desc: "Você veste intenção. Cada peça do seu look foi escolhida com estratégia — elegante, funcional e sempre pronto para qualquer ambiente. Seu visual comunica competência antes mesmo de você abrir a boca.",
    traits: ["Terno Slim", "Camisa Social", "Relógio Clássico", "Formal & Moderno"],
    cta: "Peças selecionadas para você transmitir autoridade e elegância em qualquer situação.",
    img: "img/business.jpg"
  },
  streetwear: {
    name: "Streetwear",
    tagline: "Autêntico · Cultural · Sem Regras",
    desc: "Você não segue tendências — você faz parte da cultura. Seu estilo nasceu nas ruas, foi moldado pela música, pela arte e pela autenticidade. Conforto máximo, identidade visual forte e zero necessidade de aprovação.",
    traits: ["Oversized Fit", "Tênis em Destaque", "Marcas Icônicas", "Hip-Hop & Cultura"],
    cta: "Achamos as melhores peças streetwear pra você montar um look autêntico e icônico.",
    img: "img/streetwear.jpg"
  }
};

let current = 0;
let answers = [];
const letters = ['A','B','C','D'];

function buildDots() {
  const wrap = document.getElementById('progressDots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot' + i;
    wrap.appendChild(d);
  });
}

function render() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  document.getElementById('progressLabel').textContent = `Pergunta ${current+1} de ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qNumber').textContent = String(current+1).padStart(2,'0') + ' —';
  document.getElementById('qText').textContent = q.text;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-body">
        <span class="opt-text">${opt.text}</span>
        <span class="opt-feel">${opt.feel}</span>
      </span>`;
    btn.onclick = () => pick(btn, opt.style);
    wrap.appendChild(btn);
  });

  const btn = document.getElementById('btnNext');
  btn.classList.remove('active');
  btn.textContent = current < questions.length - 1 ? 'CONTINUAR →' : 'VER MEU ESTILO →';

  questions.forEach((_,i) => {
    const d = document.getElementById('dot'+i);
    d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
  });

  const card = document.getElementById('questionCard');
  card.classList.remove('card-animate');
  void card.offsetWidth;
  card.classList.add('card-animate');
}

function pick(btn, style) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  answers[current] = style;
  document.getElementById('btnNext').classList.add('active');
}

function nextQ() {
  if (answers[current] === undefined) return;
  if (current < questions.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function showResult() {
  const count = {};
  answers.forEach(s => { count[s] = (count[s]||0) + 1; });
  const winner = Object.entries(count).sort((a,b) => b[1]-a[1])[0][0];
  const r = results[winner];

  document.getElementById('resultName').textContent    = r.name;
  document.getElementById('resultTagline').textContent = r.tagline;
  document.getElementById('resultDesc').textContent    = r.desc;
  document.getElementById('ctaSub').textContent        = r.cta;

  // render image or placeholder
  const imgWrap = document.getElementById('styleImageWrap');
  const img = new Image();
  img.onload = () => {
    imgWrap.innerHTML = `<img src="${r.img}" alt="Look ${r.name}" style="width:100%;border-radius:4px;margin-bottom:28px;display:block;object-fit:cover;aspect-ratio:3/4;">`;
  };
  img.onerror = () => {
    imgWrap.innerHTML = `
      <div class="photo-placeholder">
        <div class="photo-icon">📷</div>
        <div class="photo-ph-text">
          Adicione sua foto aqui
          <span>Coloque a imagem em img/${winner}.jpg</span>
        </div>
      </div>`;
  };
  img.src = r.img;

  const traits = document.getElementById('resultTraits');
  traits.innerHTML = '';
  r.traits.forEach(t => {
    const s = document.createElement('span');
    s.className = 'trait';
    s.textContent = t;
    traits.appendChild(s);
  });

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent  = '100%';
  questions.forEach((_,i) => { document.getElementById('dot'+i).className = 'dot done'; });

  document.getElementById('quizScreen').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  current = 0;
  answers = [];
  document.getElementById('quizScreen').style.display = 'block';
  const rs = document.getElementById('resultScreen');
  rs.classList.remove('visible');
  rs.style.display = 'none';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildDots();
render();
</script>
</body>
</html>
