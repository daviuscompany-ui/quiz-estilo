<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubra Seu Estilo Masculino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --black: #0A0A0A;
    --dark: #111111;
    --card: #161616;
    --border: rgba(201,168,76,0.2);
    --text: #E8E8E8;
    --muted: #888;
  }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .header .label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 16px;
    display: block;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 7vw, 54px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    color: #fff;
  }

  .header h1 span {
    color: var(--gold);
    display: block;
  }

  .header p {
    margin-top: 16px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 20px auto 0;
    opacity: 0.6;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .progress-bar {
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px rgba(201,168,76,0.4);
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  .question-number {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
    margin-bottom: 28px;
  }

  /* OPTIONS */
  .options {
    display: grid;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    width: 100%;
  }

  .option:hover {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.05);
    transform: translateX(4px);
  }

  .option.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .option-letter {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.25s;
  }

  .option.selected .option-letter {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
  }

  .option-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
  }

  .option-tag {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .option.selected .option-tag {
    opacity: 1;
    color: var(--gold);
  }

  /* NAV BUTTON */
  .btn-next {
    width: 100%;
    padding: 18px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 3px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    opacity: 0;
    pointer-events: none;
    position: relative;
    overflow: hidden;
    animation: none;
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
    animation: fadeUp 0.4s ease both;
  }

  .btn-next:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.25);
  }

  .btn-next::after {
    content: '→';
    margin-left: 10px;
  }

  /* ===== RESULT ===== */
  .result-screen {
    display: none;
    animation: fadeUp 0.7s ease both;
  }

  .result-screen.visible { display: block; }

  .result-badge {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-badge .pre {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    display: block;
    margin-bottom: 10px;
  }

  .result-style-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), #fff8e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(201,168,76,0.3));
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .result-emoji {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
    text-align: center;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }

  .result-desc {
    font-size: 16px;
    line-height: 1.8;
    color: #ccc;
    font-weight: 300;
    text-align: center;
    margin-bottom: 24px;
  }

  .result-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .trait-tag {
    padding: 6px 14px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }

  .cta-section {
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 28px;
    text-align: center;
  }

  .cta-section p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .cta-section strong {
    color: var(--text);
    font-weight: 600;
  }

  .btn-shopee {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    background: #EE4D2D;
    color: white;
    text-decoration: none;
    border-radius: 3px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.25s ease;
    border: none;
    cursor: pointer;
  }

  .btn-shopee:hover {
    background: #d44326;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(238,77,45,0.35);
  }

  .btn-restart {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-restart:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
  }

  /* QUIZ SCREEN */
  .quiz-screen { display: block; }
  .quiz-screen.hidden { display: none; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
    50%       { box-shadow: 0 0 0 6px rgba(201,168,76,0.15); }
  }

  .btn-next.active { animation: fadeUp 0.4s ease both, pulse 2s ease 1s infinite; }

  /* MOBILE */
  @media (max-width: 480px) {
    .question-card { padding: 24px 20px; }
    .result-card   { padding: 28px 20px; }
    .option        { padding: 14px 14px; }
    .option-tag    { display: none; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <span class="label">Quiz de Estilo Masculino</span>
    <h1>Descubra Seu <span>Estilo</span></h1>
    <p>3 perguntas para revelar qual é a sua identidade visual</p>
    <div class="divider"></div>
  </div>

  <!-- QUIZ -->
  <div class="quiz-screen" id="quizScreen">

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressLabel">Pergunta 1 de 3</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNumber">01 —</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Próxima</button>

  </div>

  <!-- RESULTADO -->
  <div class="result-screen" id="resultScreen">
    <div class="result-badge">
      <span class="pre">Seu estilo é</span>
      <div class="result-style-name" id="resultName"></div>
    </div>

    <div class="result-card">
      <span class="result-emoji" id="resultEmoji"></span>
      <p class="result-desc" id="resultDesc"></p>
      <div class="result-traits" id="resultTraits"></div>
    </div>

    <div class="cta-section">
      <p><strong>Monte seu look completo agora.</strong><br>Selecionamos as melhores peças para o seu estilo na Shopee.</p>
      <a href="SEU_LINK_AFILIADO_SHOPEE_AQUI" id="shopeeLink" class="btn-shopee" target="_blank" rel="noopener">
        🛍️ &nbsp;Ver Peças na Shopee
      </a>
    </div>

    <button class="btn-restart" onclick="restartQuiz()">↩ Refazer o Quiz</button>
  </div>

</div>

<script>
const questions = [
  {
    text: "Como você prefere aparecer numa saída à noite?",
    options: [
      { text: "Roupa simples, mas tudo combinando perfeitamente — detalhes discretos que poucos percebem",       tag: "OLD MONEY",   style: "old_money"   },
      { text: "Conjunto oversized com tênis chunky e correntes — a roupa fala antes de você chegar",              tag: "STARBOY",     style: "starboy"     },
      { text: "Blazer sem gravata, calça bem cortada — elegância sem esforço aparente",                           tag: "BUSINESS",    style: "business"    },
      { text: "Jeans destruído, moletom e sneaker exclusivo — confortável sem abrir mão de estilo",               tag: "STREETWEAR",  style: "streetwear"  },
    ]
  },
  {
    text: "Qual item você jamais abriria mão no seu guarda-roupa?",
    options: [
      { text: "Um relógio clássico de couro e uma camisa de linho bem passada",                                   tag: "OLD MONEY",   style: "old_money"   },
      { text: "Corrente grossa, óculos escuros e tênis de edição limitada",                                       tag: "STARBOY",     style: "starboy"     },
      { text: "Um blazer neutro que serve tanto para reunião quanto para jantar",                                  tag: "BUSINESS",    style: "business"    },
      { text: "Um moletom de marca e calça cargo com bolsos funcionais",                                          tag: "STREETWEAR",  style: "streetwear"  },
    ]
  },
  {
    text: "Qual frase define melhor sua relação com moda?",
    options: [
      { text: "\"Menos é mais. Qualidade acima de tudo, logotipo é pra quem precisa provar algo\"",               tag: "OLD MONEY",   style: "old_money"   },
      { text: "\"Meu look tem que impressionar. Sou o centro e sei disso\"",                                      tag: "STARBOY",     style: "starboy"     },
      { text: "\"Visto para vencer. Cada peça é estratégica\"",                                                   tag: "BUSINESS",    style: "business"    },
      { text: "\"Me visto pra mim, não pra aprovação. Conforto com identidade\"",                                 tag: "STREETWEAR",  style: "streetwear"  },
    ]
  }
];

const results = {
  old_money: {
    name: "Old Money",
    emoji: "🏛️",
    desc: "Você tem o estilo mais refinado e atemporal. Prefere qualidade a ostentação, peças clássicas a tendências passageiras. Seu guarda-roupa é discreto mas grita sofisticação pra quem entende.",
    traits: ["Linho & Tweed", "Paleta Neutra", "Relógio Clássico", "Elegância Discreta"],
    shopee: "SEU_LINK_AFILIADO_SHOPEE_AQUI"
  },
  starboy: {
    name: "Starboy",
    emoji: "⭐",
    desc: "Você vive para o impacto. Seu estilo é ousado, cheio de personalidade e não passa despercebido. Tendências, peças exclusivas e acessórios marcantes são a sua assinatura.",
    traits: ["Oversized", "Correntes & Acessórios", "Sneakers Exclusivos", "Streetlux"],
    shopee: "SEU_LINK_AFILIADO_SHOPEE_AQUI"
  },
  business: {
    name: "Business",
    emoji: "💼",
    desc: "Você veste poder com estratégia. Cada peça é escolhida com intenção — elegante, funcional e sempre pronto para qualquer ambiente. Seu estilo transmite confiança antes mesmo de você falar.",
    traits: ["Blazer Slim", "Paleta Sóbria", "Calça Bem Cortada", "Funcional & Elegante"],
    shopee: "SEU_LINK_AFILIADO_SHOPEE_AQUI"
  },
  streetwear: {
    name: "Streetwear",
    emoji: "🔥",
    desc: "Você vive a cultura. Seu estilo nasceu nas ruas e virou identidade — conforto máximo, peças icônicas e uma estética autêntica que não precisa de aprovação de ninguém.",
    traits: ["Moletom & Cargo", "Sneaker Culture", "Oversized Fit", "Autêntico"],
    shopee: "SEU_LINK_AFILIADO_SHOPEE_AQUI"
  }
};

let currentQ = 0;
let answers = [];
const letters = ['A', 'B', 'C', 'D'];

function renderQuestion() {
  const q = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);

  document.getElementById('progressLabel').textContent = `Pergunta ${currentQ + 1} de ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('questionNumber').textContent = String(currentQ + 1).padStart(2, '0') + ' —';
  document.getElementById('questionText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.setAttribute('data-style', opt.style);
    btn.innerHTML = `
      <span class="option-letter">${letters[i]}</span>
      <span class="option-text">${opt.text}</span>
      <span class="option-tag">${opt.tag}</span>
    `;
    btn.onclick = () => selectOption(btn, opt.style);
    container.appendChild(btn);
  });

  const btnNext = document.getElementById('btnNext');
  btnNext.classList.remove('active');
  btnNext.textContent = currentQ < questions.length - 1 ? 'Próxima' : 'Ver Resultado';
  btnNext.insertAdjacentText('beforeend', '');

  // Re-add arrow
  btnNext.style.position = 'relative';

  // Animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function selectOption(btn, style) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  answers[currentQ] = style;

  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = currentQ < questions.length - 1 ? 'Próxima' : 'Ver Resultado';
  btnNext.classList.add('active');
}

function nextQuestion() {
  if (answers[currentQ] === undefined) return;

  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  // Count votes
  const count = {};
  answers.forEach(s => { count[s] = (count[s] || 0) + 1; });
  const winner = Object.entries(count).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[winner];

  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultEmoji').textContent = r.emoji;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('shopeeLink').href = r.shopee;

  const traitsEl = document.getElementById('resultTraits');
  traitsEl.innerHTML = '';
  r.traits.forEach(t => {
    const span = document.createElement('span');
    span.className = 'trait-tag';
    span.textContent = t;
    traitsEl.appendChild(span);
  });

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';

  document.getElementById('quizScreen').classList.add('hidden');
  const rs = document.getElementById('resultScreen');
  rs.classList.add('visible');
  rs.style.animation = 'none';
  rs.offsetHeight;
  rs.style.animation = 'fadeUp 0.7s ease both';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  currentQ = 0;
  answers = [];
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('resultScreen').classList.remove('visible');
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderQuestion();
</script>
</body>
</html>
